{% extends 'base.html' %}
{% block title %}Вход — Coinhouse{% endblock %}
{% block content %}
<div style="max-width:420px;margin:0 auto">
<h1>Вход</h1>
<p class="sub">С возвращением за стол.</p>
<form method="post" class="card">{% csrf_token %}
  {% if form.errors %}<div class="flash error">Неверный логин или пароль.</div>{% endif %}
  <div class="field"><label>Логин</label>{{ form.username }}</div>
  <div class="field"><label>Пароль</label>{{ form.password }}</div>
  <button class="btn" type="submit" style="width:100%">Войти</button>
  <p class="helper" style="margin-top:12px;text-align:center">Нет аккаунта? <a href="{% url 'register' %}">Регистрация</a></p>
</form>
</div>
{% endblock %}
