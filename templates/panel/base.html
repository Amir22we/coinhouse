{% load static %}
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Админ — Coinhouse{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&family=Manrope:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="panel-body">
<div class="panel-layout">
  <aside class="panel-side">
    <a class="logo" href="{% url 'panel_home' %}"><span class="suit">♠</span> COINHOUSE <span class="panel-tag">админ</span></a>
    <button class="nav-toggle" type="button" aria-label="Меню" aria-expanded="false" aria-controls="panel-nav">
      <span></span><span></span><span></span>
    </button>
    <nav class="panel-nav" id="panel-nav">
      <a href="{% url 'panel_home' %}" {% if request.path == '/panel/' %}class="active"{% endif %}>Обзор</a>
      <a href="{% url 'panel_requests' %}" {% if '/panel/requests' in request.path %}class="active"{% endif %}>Заявки{% if panel_pending %} <span class="badge-dot">{{ panel_pending }}</span>{% endif %}</a>
      <a href="{% url 'panel_users' %}" {% if '/panel/users' in request.path %}class="active"{% endif %}>Пользователи</a>
      <a href="{% url 'panel_economy' %}" {% if '/panel/economy' in request.path %}class="active"{% endif %}>Экономика</a>
      <div class="panel-side-bottom">
        <a href="{% url 'home' %}">← На сайт</a>
        <form method="post" action="{% url 'logout' %}">{% csrf_token %}
          <button class="btn ghost sm" type="submit">Выйти</button>
        </form>
      </div>
    </nav>
  </aside>
  <main class="panel-main">
    {% for m in messages %}<div class="flash {{ m.tags }}">{{ m }}</div>{% endfor %}
    {% block content %}{% endblock %}
  </main>
</div>
<script>
(function(){
  var btn=document.querySelector('.nav-toggle'),menu=document.getElementById('panel-nav');
  if(!btn||!menu)return;
  btn.addEventListener('click',function(){
    var open=menu.classList.toggle('open');
    btn.classList.toggle('open',open);
    btn.setAttribute('aria-expanded',open);
  });
})();
</script>
</body>
</html>
